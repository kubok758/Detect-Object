<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Что это и сколько стоит?</title>
  <!-- Tell the browser this page is installable as a PWA -->
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <!-- Icons for various devices -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <style>
    /*
      Основные стили приложения. Темная тема с эффектом стекла для панелей,
      адаптивные размеры и современный вид. Все элементы подписаны
      комментариями для облегчения работы с кодом.
    */
    :root {
      --bg-color: rgba(0, 0, 0, 0.85);
      --panel-bg: rgba(255, 255, 255, 0.08);
      --panel-blur: 12px;
      --accent-color: #00aaff;
      --text-color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Верхняя панель навигации */
    #tab-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      z-index: 1000;
    }
    #tab-bar button {
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 0;
      flex: 1;
      padding: 12px 0;
      outline: none;
    }
    #tab-bar button:hover svg,
    #tab-bar button.active svg {
      color: var(--accent-color);
    }
    #tab-bar svg {
      display: block;
      margin: 0 auto;
      color: var(--text-color);
      width: 24px;
      height: 24px;
      transition: color 0.3s;
    }

    /* Основные вьюшки (камеры, история, настройки) */
    .view {
      position: fixed;
      top: 56px; /* под панель навигации */
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      padding: 0;
      display: none;
    }
    .view.active {
      display: block;
    }

    /* Камера */
    #camera-view {
      background-color: #000;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #crosshair {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.4);
    }
    #crosshair::before {
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
    }
    #crosshair::after {
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
    }

    /* Кнопка захвата */
    #capture-button {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 72px;
      height: 72px;
      border: 4px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
    }
    #capture-button:active {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Кнопка загрузки фото */
    #upload-container {
      position: absolute;
      top: 70px;
      right: 12px;
      z-index: 100;
    }
    #upload-btn {
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #upload-btn svg {
      color: var(--text-color);
      width: 22px;
      height: 22px;
    }

    /* Панель результатов */
    #result-panel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(var(--panel-blur));
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 20px;
      color: var(--text-color);
      overflow-y: auto;
    }
    #result-content {
      width: 100%;
      max-width: 500px;
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }
    #result-content h2 {
      margin-top: 0;
      font-size: 1.4rem;
    }
    #result-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      justify-content: center;
    }
    .result-action {
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text-color);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .result-action:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* История распознаваний */
    #history-view {
      overflow-y: auto;
      padding: 20px;
    }
    .history-item {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .history-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }
    .history-details {
      flex: 1;
      min-width: 0;
    }
    .history-details h4 {
      margin: 0 0 4px;
      font-size: 1rem;
    }
    .history-details p {
      margin: 0;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Экран настройки API */
    #settings-view {
      padding: 20px;
      overflow-y: auto;
    }
    #settings-view h3 {
      margin-top: 0;
    }
    .settings-group {
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .settings-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .settings-group input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-color);
    }
    .settings-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .settings-actions button {
      flex: 1 1 auto;
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 10px;
      color: var(--text-color);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .settings-actions button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Сообщения */
    .alert {
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }
    .alert.error { background: rgba(255, 0, 0, 0.3); }
    .alert.success { background: rgba(0, 128, 0, 0.3); }
    .alert.info { background: rgba(0, 0, 255, 0.3); }
  </style>
</head>
<body>
  <!-- Панель навигации -->
  <nav id="tab-bar">
    <button id="tab-camera" class="active" title="Камера">
      <!-- Camera icon -->
      <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"></rect><circle cx="12" cy="14" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle><rect x="8" y="3" width="8" height="4" fill="none" stroke="currentColor" stroke-width="2"></rect></svg>
    </button>
    <button id="tab-history" title="История">
      <!-- History icon -->
      <svg viewBox="0 0 24 24"><path d="M12 8v5l3 3" fill="none" stroke="currentColor" stroke-width="2"></path><path d="M21 12a9 9 0 1 1-9-9" fill="none" stroke="currentColor" stroke-width="2"></path><polyline points="12 3 12 6 9 6" fill="none" stroke="currentColor" stroke-width="2"></polyline></svg>
    </button>
    <button id="tab-settings" title="Настройки">
      <!-- Settings icon -->
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
    </button>
  </nav>

  <!-- Вью для камеры -->
  <main id="camera-view" class="view active">
    <video id="video" autoplay playsinline></video>
    <div id="crosshair"></div>
    <div id="upload-container">
      <button id="upload-btn" title="Загрузить фото">
        <!-- Upload icon -->
        <svg viewBox="0 0 24 24"><path d="M12 16V4" fill="none" stroke="currentColor" stroke-width="2"></path><path d="M16 8l-4-4-4 4" fill="none" stroke="currentColor" stroke-width="2"></path><rect x="4" y="16" width="16" height="4" fill="none" stroke="currentColor" stroke-width="2"></rect></svg>
      </button>
      <input id="file-input" type="file" accept="image/*" style="display:none">
    </div>
    <div id="capture-button" title="Сделать снимок"></div>
    <!-- Панель результатов -->
    <div id="result-panel">
      <div id="result-content">
        <h2 id="result-title"></h2>
        <pre id="result-text" style="white-space: pre-wrap; font-family: inherit;"></pre>
        <div id="result-actions">
          <button id="btn-share" class="result-action">Поделиться</button>
          <button id="btn-copy" class="result-action">Скопировать</button>
          <button id="btn-save" class="result-action">Скачать</button>
          <button id="btn-another" class="result-action">Анализировать ещё</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Вью истории -->
  <main id="history-view" class="view">
    <h3>История распознаваний</h3>
    <div id="history-list"></div>
  </main>

  <!-- Вью настроек/API-ключа -->
  <main id="settings-view" class="view">
    <h3>Настройки API Gemini</h3>
    <div id="settings-messages"></div>
    <div class="settings-group">
      <label for="api-key-input">API ключ Gemini:</label>
      <input type="text" id="api-key-input" placeholder="Введите ключ">
      <div class="settings-actions">
        <button id="btn-save-key">Сохранить</button>
        <button id="btn-check-key">Проверить</button>
        <button id="btn-clear-key">Удалить</button>
      </div>
    </div>
    <p>Получите свой ключ бесплатно на <a href="https://aistudio.google.com/apikey" target="_blank" style="color: var(--accent-color); text-decoration: underline;">Google AI Studio</a> и вставьте сюда. Ключ хранится только на вашем устройстве.</p>
  </main>

  <script>
    // Глобальные переменные
    let currentStream = null;
    const video = document.getElementById('video');
    const captureButton = document.getElementById('capture-button');
    const resultPanel = document.getElementById('result-panel');
    const resultTitle = document.getElementById('result-title');
    const resultText = document.getElementById('result-text');
    const historyList = document.getElementById('history-list');
    const settingsMessages = document.getElementById('settings-messages');
    const apiKeyInput = document.getElementById('api-key-input');
    const models = [
      'models/gemini-1.0-pro-vision-latest',
      'models/gemini-1.0-pro',
      'models/gemini-1.5-flash'
    ];

    // Функция переключения вкладок
    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.querySelectorAll('#tab-bar button').forEach(b => b.classList.remove('active'));
      if (viewId === 'camera-view') {
        document.getElementById('tab-camera').classList.add('active');
      } else if (viewId === 'history-view') {
        document.getElementById('tab-history').classList.add('active');
      } else if (viewId === 'settings-view') {
        document.getElementById('tab-settings').classList.add('active');
      }
    }

    // Слушатели вкладок
    document.getElementById('tab-camera').addEventListener('click', () => {
      showView('camera-view');
      // При возврате на камеру запускаем её снова, если ключ уже сохранен
      if (localStorage.getItem('gemini_api_key')) {
        startCamera();
      }
    });
    document.getElementById('tab-history').addEventListener('click', () => {
      showView('history-view');
      loadHistory();
      stopCamera();
    });
    document.getElementById('tab-settings').addEventListener('click', () => {
      showView('settings-view');
      stopCamera();
      loadApiKeyToInput();
    });

    // Камера: запуск и остановка
    async function startCamera() {
      if (currentStream) return;
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
        video.srcObject = currentStream;
        await video.play();
      } catch (err) {
        console.error('Ошибка запуска камеры', err);
        alert('Не удалось запустить камеру: ' + err.message);
      }
    }
    function stopCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      video.srcObject = null;
    }

    // Захват фото
    captureButton.addEventListener('click', capturePhoto);
    async function capturePhoto() {
      // если камера не запущена
      if (!currentStream) return;
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      stopCamera();
      // сразу анализируем
      analyzeImage(dataUrl);
    }

    // Загрузка фото из файла
    document.getElementById('upload-btn').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });
    document.getElementById('file-input').addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          const base64 = e.target.result;
          stopCamera();
          analyzeImage(base64);
        };
        reader.readAsDataURL(file);
      }
    });

    // Анализ изображения с перебором моделей
    async function analyzeImage(dataUrl) {
      const apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey) {
        alert('Сначала настройте API ключ в разделе настроек.');
        showView('settings-view');
        return;
      }
      // Показываем панель результатов
      resultTitle.textContent = 'Анализ...';
      resultText.textContent = '';
      resultPanel.style.display = 'flex';
      try {
        // Извлекаем base64 без префикса "data:image/...;base64,"
        const base64data = dataUrl.split(',')[1];
        let modelIndex = 0;
        let lastError;
        while (modelIndex < models.length) {
          const modelName = models[modelIndex];
          try {
            const response = await callGeminiApi(modelName, apiKey, base64data);
            if (response) {
              // парсим текст ответа
              handleGeminiResponse(response, modelName, dataUrl);
              return;
            }
          } catch (err) {
            lastError = err;
            console.warn('Model ' + modelName + ' failed:', err);
            // Если ошибка связана с лимитом, пробуем следующую модель
            // Анализируем err.message на 429 или quota
            if (err.message && /429|quota|rate/i.test(err.message)) {
              modelIndex++;
              continue;
            } else {
              break;
            }
          }
        }
        // Если дошли сюда, ничего не удалось
        throw lastError || new Error('Не удалось выполнить анализ');
      } catch (err) {
        console.error(err);
        resultTitle.textContent = 'Ошибка анализа';
        resultText.textContent = err.message;
        // Прячем кнопку поделиться, копировать и сохранить
        document.getElementById('result-actions').style.display = 'none';
      }
    }

    // Вызов Gemini API для одной модели
    async function callGeminiApi(model, apiKey, base64data) {
      const url = `https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${apiKey}`;
      // Строим содержимое запроса. Просим вернуть JSON с описанием и ценой в рублях.
      const prompt = `Определи, что изображено на фотографии. Верни информацию в формате JSON, где есть поля: название, тип, категория, модель, уровень уверенности (в процентах), краткое описание, цена_новая (в рублях), цена_б/у (в рублях), диапазон_цен (в рублях). Если предмет - автомобиль, верни марку, модель автомобиля, поколение, годы выпуска, тип кузова, тип двигателя, мощность, среднюю цену на вторичном рынке и среднюю цену нового. Если предмет - смартфон, планшет, ноутбук, компьютер, телевизор или консоль, верни производителя, модель, год выпуска и основные характеристики. Если сложно оценить, укажи предупреждение. Текст результата на русском.`;
      const body = {
        contents: [
          {
            role: 'user',
            parts: [
              { text: prompt },
              { inline_data: { mime_type: 'image/jpeg', data: base64data } }
            ]
          }
        ],
        response_mime_type: 'application/json'
      };
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`API ${response.status}: ${text}`);
      }
      const json = await response.json();
      const candidate = json.candidates && json.candidates[0];
      if (!candidate || !candidate.content || !candidate.content.parts || !candidate.content.parts[0]) {
        throw new Error('Пустой ответ от модели');
      }
      return candidate.content.parts[0].text;
    }

    // Обработка ответа Gemini
    function handleGeminiResponse(text, modelName, imageDataUrl) {
      resultTitle.textContent = 'Результат распознавания';
      let parsed;
      let displayText;
      try {
        parsed = JSON.parse(text);
        // Формируем красивый текст для отображения
        displayText = '';
        for (const key in parsed) {
          if (Object.prototype.hasOwnProperty.call(parsed, key)) {
            displayText += `${key}: ${parsed[key]}\n`;
          }
        }
      } catch (e) {
        // Если не JSON, выводим как есть
        displayText = text;
      }
      resultText.textContent = displayText + `\n\n(модель: ${modelName})`;
      // Показать действия
      document.getElementById('result-actions').style.display = 'flex';
      // Сохраняем в историю
      saveHistory({
        image: imageDataUrl,
        text: displayText,
        date: new Date().toLocaleString()
      });
    }

    // Сохранение в историю
    function saveHistory(entry) {
      const history = JSON.parse(localStorage.getItem('history') || '[]');
      history.unshift(entry);
      // Ограничиваем историю 50 элементами
      if (history.length > 50) history.pop();
      localStorage.setItem('history', JSON.stringify(history));
    }
    // Загрузка истории
    function loadHistory() {
      historyList.innerHTML = '';
      const history = JSON.parse(localStorage.getItem('history') || '[]');
      if (history.length === 0) {
        historyList.innerHTML = '<p>История пуста.</p>';
        return;
      }
      history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        const img = document.createElement('img');
        img.src = item.image;
        const details = document.createElement('div');
        details.className = 'history-details';
        const title = document.createElement('h4');
        title.textContent = item.text.split('\n')[0] || 'Результат';
        const meta = document.createElement('p');
        meta.textContent = item.date;
        details.appendChild(title);
        details.appendChild(meta);
        div.appendChild(img);
        div.appendChild(details);
        div.addEventListener('click', () => {
          // При нажатии показываем панель результатов с этим элементом
          resultPanel.style.display = 'flex';
          resultTitle.textContent = 'Из истории';
          resultText.textContent = item.text;
          document.getElementById('result-actions').style.display = 'flex';
        });
        historyList.appendChild(div);
      });
    }

    // Загрузка API ключа в поле настроек
    function loadApiKeyToInput() {
      const saved = localStorage.getItem('gemini_api_key');
      apiKeyInput.value = saved || '';
    }

    // Кнопки действий в настройках
    document.getElementById('btn-save-key').addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        showSettingsMessage('Введите ключ', 'error');
        return;
      }
      localStorage.setItem('gemini_api_key', key);
      showSettingsMessage('Ключ сохранен', 'success');
    });
    document.getElementById('btn-check-key').addEventListener('click', async () => {
      const key = apiKeyInput.value.trim() || localStorage.getItem('gemini_api_key');
      if (!key) {
        showSettingsMessage('Сначала сохраните ключ', 'error');
        return;
      }
      showSettingsMessage('Проверяем ключ...', 'info');
      try {
        const testBody = {
          contents: [ { role: 'user', parts: [ { text: 'ping' } ] } ],
          response_mime_type: 'application/json'
        };
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(testBody)
        });
        if (resp.ok) {
          showSettingsMessage('Ключ рабочий!', 'success');
          localStorage.setItem('gemini_api_key', key);
        } else {
          const text = await resp.text();
          showSettingsMessage('Ошибка: ' + resp.status + ' ' + text.slice(0, 100), 'error');
        }
      } catch (err) {
        showSettingsMessage('Сетевая ошибка: ' + err.message, 'error');
      }
    });
    document.getElementById('btn-clear-key').addEventListener('click', () => {
      localStorage.removeItem('gemini_api_key');
      apiKeyInput.value = '';
      showSettingsMessage('Ключ удален', 'info');
    });

    function showSettingsMessage(text, type) {
      const div = document.createElement('div');
      div.className = 'alert ' + type;
      div.textContent = text;
      settingsMessages.appendChild(div);
      // auto remove after 5s
      setTimeout(() => div.remove(), 5000);
    }

    // Кнопки действий результата
    document.getElementById('btn-another').addEventListener('click', () => {
      resultPanel.style.display = 'none';
      showView('camera-view');
      startCamera();
    });
    document.getElementById('btn-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(resultText.textContent).then(() => {
        alert('Скопировано в буфер обмена');
      });
    });
    document.getElementById('btn-share').addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({ text: resultText.textContent }).catch(err => console.error(err));
      } else {
        alert('Функция совместного доступа не поддерживается');
      }
    });
    document.getElementById('btn-save').addEventListener('click', () => {
      // Создаем изображение из текста и иконки
      const canvas = document.createElement('canvas');
      const width = 800;
      const height = 600;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = '#ffffff';
      ctx.font = '16px sans-serif';
      const lines = resultText.textContent.split('\n');
      let y = 30;
      lines.forEach(line => {
        ctx.fillText(line, 20, y);
        y += 20;
      });
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'result.png';
      link.click();
    });

    // Регистрация service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }

    // Запуск при первой загрузке
    window.addEventListener('DOMContentLoaded', () => {
      // Проверяем наличие ключа
      if (localStorage.getItem('gemini_api_key')) {
        showView('camera-view');
        startCamera();
      } else {
        showView('settings-view');
      }
    });
  </script>
</body>
</html>
